workspace:
  name: finance-testing-for-demo
  display_name: Finance testing_for_demo
  description: Multi-layer data platform with Bronze/Silver/Gold quality gates
  capacity_id: ${FABRIC_CAPACITY_ID}
  domain: ${FABRIC_DOMAIN_NAME}
  git_repo: ${GIT_REPO_URL}
  git_branch: main
  git_directory: /
environments:
  dev:
    workspace:
      name: finance-testing-for-demo
      capacity_id: ${FABRIC_CAPACITY_ID}
  test:
    workspace:
      capacity_id: ${FABRIC_CAPACITY_ID}
  prod:
    workspace:
      capacity_id: ${FABRIC_CAPACITY_ID}
folders:
- 000 Orchestrate
- 100 Ingest
- 200 Store
- 300 Prepare
- 400 Model
- 500 Visualize
- 999 Libraries
- Archive
folder_rules:
- type: DataPipeline
  folder: 000 Orchestrate
- type: DataflowGen2
  folder: 000 Orchestrate
- type: Eventstream
  folder: 100 Ingest
- type: Lakehouse
  folder: 200 Store
- type: Notebook
  folder: 300 Prepare
- type: SparkJobDefinition
  folder: 300 Prepare
- type: Warehouse
  folder: 400 Model
- type: SemanticModel
  folder: 400 Model
- type: Report
  folder: 500 Visualize
- type: Dashboard
  folder: 500 Visualize
- type: Environment
  folder: 999 Libraries
lakehouses: []
notebooks: []
resources: []
principals:
- id: ${AZURE_CLIENT_ID}
  role: Contributor
  description: "Automation SP \u2014 required for CI/CD deployments"
- id: ${ADDITIONAL_ADMIN_PRINCIPAL_ID}
  role: Admin
  description: Mandatory governance admin group
- id: ${ADDITIONAL_CONTRIBUTOR_PRINCIPAL_ID}
  role: Contributor
  description: Mandatory governance contributor group
- id: ${PROJECT_ADMIN_ID}
  role: Admin
  description: "Project admins \u2014 set via PROJECT_ADMIN_ID secret"
- id: ${PROJECT_MEMBERS_ID}
  role: Member
  description: "Data engineering team \u2014 set via PROJECT_MEMBERS_ID secret"
deployment_pipeline:
  pipeline_name: Finance-testing_for_demo Pipeline
  stages:
    development:
      workspace_name: finance-testing-for-demo
      capacity_id: ${FABRIC_CAPACITY_ID}
    test:
      workspace_name: finance-testing-for-demo [Test]
      capacity_id: ${FABRIC_CAPACITY_ID_TEST:-FABRIC_CAPACITY_ID}
    production:
      workspace_name: finance-testing-for-demo [Production]
      capacity_id: ${FABRIC_CAPACITY_ID_PROD:-FABRIC_CAPACITY_ID}
